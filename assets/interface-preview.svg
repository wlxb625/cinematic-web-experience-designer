<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
<title id="title">Tongxing memory growth interface</title><desc id="desc">A cinematic AI companion dashboard with memory, goals, growth graph and conversation.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050914"/><stop offset="1" stop-color="#111a32"/></linearGradient><radialGradient id="core"><stop stop-color="#fff7d5"/><stop offset=".16" stop-color="#f1bc77"/><stop offset=".48" stop-color="#8f78ff" stop-opacity=".5"/><stop offset="1" stop-color="#10172d" stop-opacity="0"/></radialGradient><filter id="g"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1440" height="900" rx="36" fill="url(#bg)"/><g stroke="#fff" stroke-opacity=".1"><line x1="210" y1="0" x2="210" y2="900"/><line x1="210" y1="650" x2="1440" y2="650"/></g>
<g font-family="Inter, system-ui, sans-serif" fill="#f5f3ef"><text x="54" y="66" font-size="26">同行</text><text x="54" y="88" font-size="11" opacity=".5" letter-spacing="3">TONGXING</text><g font-size="15" opacity=".68"><text x="54" y="158">首页  Home</text><text x="54" y="210">对话  Chat</text><text x="54" y="262">记忆  Memory</text><text x="54" y="314">目标  Goals</text><text x="54" y="366">洞察  Insights</text><text x="54" y="418">成长  Growth</text></g><text x="54" y="820" font-size="14" opacity=".48">设置  Settings</text>
<text x="270" y="150" font-size="48" font-weight="500">我记得你的热爱，</text><text x="270" y="208" font-size="48" font-weight="500">也看见你的成长。</text><text x="270" y="258" font-size="17" opacity=".6">一个在记忆、目标与行动中持续成长的 AI 伙伴。</text><rect x="270" y="300" width="150" height="48" rx="24" fill="#f0c184"/><text x="306" y="331" fill="#17131b" font-size="15" font-weight="600">开始探索 →</text></g>
<g transform="translate(660 90)"><circle cx="210" cy="210" r="205" fill="url(#core)"/><circle cx="210" cy="210" r="34" fill="#fff4d0" filter="url(#g)"/><g stroke="#c9bbff" stroke-opacity=".35"><path d="M210 210 C85 150 42 85 34 30"/><path d="M210 210 C330 150 382 82 406 38"/><path d="M210 210 C88 286 55 350 40 398"/><path d="M210 210 C330 285 382 350 410 390"/></g><g fill="#171f3a" stroke="#cbbcff" stroke-opacity=".45"><circle cx="34" cy="30" r="30"/><circle cx="406" cy="38" r="30"/><circle cx="40" cy="398" r="30"/><circle cx="410" cy="390" r="30"/></g><g fill="#fff" font-family="Inter,system-ui" font-size="13" text-anchor="middle"><text x="34" y="35">记忆</text><text x="406" y="43">目标</text><text x="40" y="403">洞察</text><text x="410" y="395">成长</text></g></g>
<g transform="translate(1120 95)" font-family="Inter,system-ui"><rect width="270" height="430" rx="22" fill="#0b1020" stroke="#fff" stroke-opacity=".14"/><text x="22" y="36" fill="#fff" font-size="16">同行 · 在线</text><g fill="#171e31"><rect x="18" y="62" width="234" height="72" rx="12"/><rect x="42" y="150" width="210" height="58" rx="12"/><rect x="18" y="224" width="234" height="58" rx="12"/><rect x="42" y="298" width="210" height="58" rx="12"/></g><g fill="#fff" opacity=".64" font-size="13"><text x="34" y="89">今天过得怎么样？</text><text x="34" y="112">有什么想和我聊的吗？</text><text x="56" y="177">帮我回顾最近的想法</text><text x="34" y="251">你最近更敢表达自己了。</text><text x="56" y="325">给我一点行动建议</text></g><rect x="18" y="374" width="234" height="38" rx="12" fill="#151b2c"/><text x="34" y="399" fill="#fff" opacity=".36" font-size="12">输入你的想法…</text></g>
<g transform="translate(250 680)" font-family="Inter,system-ui"><text fill="#fff" font-size="24">我们共同构建的记忆与知识</text><text y="34" fill="#fff" opacity=".5" font-size="14">每一次对话，都在形成属于你们的连接。</text><g transform="translate(470 -8)"><rect width="230" height="150" rx="18" fill="#10172a" stroke="#fff" stroke-opacity=".1"/><text x="20" y="30" fill="#fff" font-size="15">记忆片段</text><text x="178" y="30" fill="#c7b7ff" font-size="20">247</text><g fill="#fff" opacity=".46" font-size="12"><text x="20" y="64">讨论职业发展的方向</text><text x="20" y="94">学习 UI / UX 设计</text><text x="20" y="124">分享了旅行的快乐</text></g></g><g transform="translate(720 -8)"><rect width="230" height="150" rx="18" fill="#10172a" stroke="#fff" stroke-opacity=".1"/><text x="20" y="30" fill="#fff" font-size="15">知识图谱</text><g stroke="#9f8aff" stroke-opacity=".4"><line x1="115" y1="88" x2="62" y2="62"/><line x1="115" y1="88" x2="170" y2="58"/><line x1="115" y1="88" x2="74" y2="122"/><line x1="115" y1="88" x2="170" y2="120"/></g><g fill="#252d49" stroke="#bbaaff"><circle cx="115" cy="88" r="24"/><circle cx="62" cy="62" r="15"/><circle cx="170" cy="58" r="15"/><circle cx="74" cy="122" r="15"/><circle cx="170" cy="120" r="15"/></g></g><g transform="translate(970 -8)"><rect width="230" height="150" rx="18" fill="#10172a" stroke="#fff" stroke-opacity=".1"/><text x="20" y="30" fill="#fff" font-size="15">情绪曲线</text><path d="M20 112 C45 85 58 120 78 80 S115 66 130 98 S160 125 178 76 S208 90 216 62" fill="none" stroke="#b8a8ff" stroke-width="3"/><line x1="20" y1="128" x2="216" y2="128" stroke="#fff" stroke-opacity=".12"/></g></g>
