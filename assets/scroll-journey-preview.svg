<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
<title id="title">Scroll-linked cinematic journey</title><desc id="desc">Four cinematic scenes connected by scroll progress.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050914"/><stop offset=".55" stop-color="#101833"/><stop offset="1" stop-color="#21152d"/></linearGradient>
  <radialGradient id="core"><stop stop-color="#fff4d1"/><stop offset=".22" stop-color="#f3bd78" stop-opacity=".95"/><stop offset=".55" stop-color="#8f79ff" stop-opacity=".45"/><stop offset="1" stop-color="#18234b" stop-opacity="0"/></radialGradient>
  <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#573e73"/><stop offset=".5" stop-color="#d08370"/><stop offset="1" stop-color="#f3c58c"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1440" height="900" rx="36" fill="url(#bg)"/>
<g font-family="Inter, system-ui, sans-serif" fill="#f5f4f1">
  <text x="72" y="84" font-size="18" opacity=".55" letter-spacing="4">CINEMATIC SCROLL SYSTEM</text>
  <text x="72" y="136" font-size="42" font-weight="600">One scroll. Four connected scenes.</text>
  <text x="72" y="174" font-size="18" opacity=".65">Pin · scrub · transform · handoff · return</text>
</g>
<g transform="translate(72 230)">
  <rect width="1296" height="560" rx="28" fill="#070b16" stroke="#ffffff" stroke-opacity=".12"/>
  <line x1="92" y1="470" x2="1204" y2="470" stroke="#ffffff" stroke-opacity=".15"/>
  <line x1="92" y1="470" x2="1204" y2="470" stroke="#f3bd78" stroke-width="3" stroke-dasharray="0 270 270 270 270 270" opacity=".75"/>
  <g font-family="Inter, system-ui, sans-serif">
    <g transform="translate(120 42)"><text fill="#f0c68d" font-size="15" letter-spacing="2">01 · ARRIVAL</text><text y="34" fill="#fff" font-size="26">Memory core appears</text><text y="64" fill="#fff" opacity=".5" font-size="15">The subject anchors the scene.</text>
      <circle cx="142" cy="210" r="122" fill="url(#core)" filter="url(#glow)"/><circle cx="142" cy="210" r="24" fill="#fff4d1"/>
    </g>
    <g transform="translate(412 42)"><text fill="#f0c68d" font-size="15" letter-spacing="2">02 · EXPANSION</text><text y="34" fill="#fff" font-size="26">Fragments orbit outward</text><text y="64" fill="#fff" opacity=".5" font-size="15">Cards inherit motion from the core.</text>
      <circle cx="142" cy="210" r="70" fill="url(#core)"/><g fill="#17203d" stroke="#bda9ff" stroke-opacity=".45"><rect x="8" y="118" width="96" height="66" rx="12"/><rect x="190" y="98" width="96" height="66" rx="12"/><rect x="176" y="250" width="106" height="70" rx="12"/><rect x="18" y="260" width="102" height="68" rx="12"/></g><g stroke="#c6b4ff" stroke-opacity=".35"><line x1="104" y1="151" x2="130" y2="190"/><line x1="190" y1="132" x2="157" y2="192"/><line x1="176" y1="280" x2="154" y2="232"/><line x1="120" y1="289" x2="137" y2="236"/></g>
    </g>
    <g transform="translate(704 42)"><text fill="#f0c68d" font-size="15" letter-spacing="2">03 · JOURNEY</text><text y="34" fill="#fff" font-size="26">Graph becomes a path</text><text y="64" fill="#fff" opacity=".5" font-size="15">The scene hands motion to time.</text>
      <path d="M10 285 C70 240 92 302 144 246 S236 210 278 150" fill="none" stroke="#f3bd78" stroke-width="4" filter="url(#glow)"/><g fill="#fff4d1"><circle cx="10" cy="285" r="7"/><circle cx="92" cy="270" r="7"/><circle cx="166" cy="230" r="7"/><circle cx="232" cy="212" r="7"/><circle cx="278" cy="150" r="9"/></g>
    </g>
    <g transform="translate(996 42)"><text fill="#f0c68d" font-size="15" letter-spacing="2">04 · RETURN</text><text y="34" fill="#fff" font-size="26">Motion resolves into calm</text><text y="64" fill="#fff" opacity=".5" font-size="15">The final light becomes the CTA.</text>
      <rect x="0" y="105" width="270" height="230" rx="20" fill="url(#dawn)"/><circle cx="185" cy="190" r="34" fill="#fff0b7" filter="url(#glow)"/><path d="M0 280 L60 220 110 258 166 205 270 290 270 335 0 335Z" fill="#171630" opacity=".9"/>
    </g>
    <g fill="#f3bd78"><circle cx="120" cy="470" r="8"/><circle cx="412" cy="470" r="8"/><circle cx="704" cy="470" r="8"/><circle cx="996" cy="470" r="8"/><circle cx="1204" cy="470" r="10"/></g>
    <g fill="#fff" opacity=".5" font-size="13"><text x="110" y="510">0%</text><text x="402" y="510">25%</text><text x="694" y="510">50%</text><text x="986" y="510">75%</text><text x="1188" y="510">100%</text></g>
  </g>
</g>
</svg>
